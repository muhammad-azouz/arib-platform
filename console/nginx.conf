server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE event stream — must not be buffered (events would sit in nginx until
    # the buffer fills) and must outlive the default 60s read timeout between
    # heartbeats. access_log off: EventSource cannot set headers, so the access
    # token rides the query string on this one route — keep it out of logs.
    location ~ ^/v1/tenants/[^/]+/events$ {
        proxy_pass         http://api:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 1h;
        access_log         off;
    }

    # Proxy API calls so the UI uses relative paths (mirrors Vite dev proxy)
    location /v1/ {
        proxy_pass         http://api:8080/v1/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Velopack update feed — the desktop-download link (installerUrl()) hits
    # this as a relative same-origin path, same as /v1/ above.
    location /updates/ {
        proxy_pass         http://api:8080/updates/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
