services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: arib_license
    volumes:
      - mongo_data:/data/db
    networks: [license]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    env_file: api/.env
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/arib_license?authSource=admin
    volumes:
      - ./api/keys:/app/keys:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks: [license]
    depends_on:
      mongodb: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  admin:
    build: ./admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    networks: [license]
    depends_on:
      api: { condition: service_healthy }

  # ---- dev only (docker compose --profile dev up) ----
  mongo-express:
    image: mongo-express
    restart: unless-stopped
    profiles: [dev]
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/
    networks: [license]
    depends_on:
      mongodb: { condition: service_healthy }

volumes:
  mongo_data:

networks:
  license:
    driver: bridge
