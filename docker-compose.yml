name: arib-platform

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    networks: [arib-platform]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    env_file: api/.env
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/${MONGO_DB}?authSource=admin
      UPDATES_DIR: /app/updates
    volumes:
      - ./api/keys:/app/keys:ro
      # Velopack update feed ({channel}/{rid}/...), populated by desktop/ops/release.sh
      - /srv/arib/updates:/app/updates:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks: [arib-platform]
    depends_on:
      mongodb: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  admin:
    build: ./admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    networks: [arib-platform]
    depends_on:
      api: { condition: service_healthy }

  console:
    build: ./console
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    networks: [arib-platform]
    depends_on:
      api: { condition: service_healthy }

volumes:
  # Pinned to the volume already holding real tenant data — the compose
  # project name has drifted across deploys (arib-license → platform →
  # arib-platform, the last via the top-level `name:` above), which would
  # otherwise make Compose reach for a fresh, empty {project}_mongo_data
  # volume depending on which project name is active. Pinning here means
  # `-p platform` is never needed again, on this host or any other.
  mongo_data:
    name: platform_mongo_data

networks:
  arib-platform:
    name: arib-platform
    driver: bridge
