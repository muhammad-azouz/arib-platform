services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: arib_license
    volumes:
      - mongo_data:/data/db
    networks: [arib-platform]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    env_file: api/.env
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/arib_license?authSource=admin
    volumes:
      - ./api/keys:/app/keys:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks: [arib-platform]
    depends_on:
      mongodb: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  admin:
    build: ./admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    networks: [arib-platform]
    depends_on:
      api: { condition: service_healthy }

  console:
    build: ./console
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    networks: [arib-platform]
    depends_on:
      api: { condition: service_healthy }

volumes:
  mongo_data:

networks:
  arib-platform:
    name: arib-platform
    driver: bridge
